<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Family Reel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --paper:      #F6F1E7;
    --ink:        #211F1D;
    --rust:       #B5602E;
    --teal:       #2C6764;
    --sprocket:   #8B8578;
    --line:       rgba(33,31,29,0.14);
    --paper-dim:  #EDE6D6;
    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--font-body); }

  /* ---------- film strip chrome ---------- */
  .filmstrip-edge{
    height:22px;
    background-image: radial-gradient(circle, var(--paper) 5px, var(--sprocket) 5px 5.5px, transparent 5.6px);
    background-size: 34px 22px;
    background-repeat: repeat-x;
    background-position: center;
    background-color:var(--ink);
  }

  header{ padding: 56px 24px 40px; max-width: 980px; margin: 0 auto; }
  .eyebrow{
    font-family:var(--font-mono); font-size:13px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--rust); display:flex; align-items:center; gap:10px;
  }
  .eyebrow::before{ content:"●"; font-size:10px; }
  h1{
    font-family:var(--font-display); font-weight:600; font-optical-sizing:auto;
    font-size:clamp(40px, 7vw, 72px); line-height:0.98; margin: 10px 0 14px; letter-spacing:-0.01em;
  }
  header p.sub{ font-size:17px; max-width:560px; line-height:1.5; color:rgba(33,31,29,0.72); margin:0; }
  #frame-counter{ font-family:var(--font-mono); }

  main{ max-width: 980px; margin:0 auto; padding: 0 24px 100px; }

  /* ---------- upload card ---------- */
  .upload-card{
    background:var(--paper-dim); border:1px solid var(--line); border-radius:2px;
    padding:28px; margin: 8px 0 56px; position:relative;
  }
  .upload-card::before{
    content:"LOAD FILM"; position:absolute; top:-11px; left:24px; background:var(--ink);
    color:var(--paper); font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; padding:3px 10px;
  }

  .upload-steps{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap:16px; margin-bottom:18px; }
  @media (max-width: 820px){ .upload-steps{ grid-template-columns:1fr 1fr; } }
  @media (max-width: 560px){ .upload-steps{ grid-template-columns:1fr; } }

  label{
    display:block; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em;
    text-transform:uppercase; color:rgba(33,31,29,0.6); margin-bottom:6px;
  }
  input[type=text]{
    width:100%; font-family:var(--font-body); font-size:15px; padding:11px 12px;
    background:var(--paper); border:1px solid var(--line); border-radius:1px; color:var(--ink);
  }
  input[type=text]:focus, button:focus-visible, .dropzone:focus-visible{
    outline: 2px solid var(--teal); outline-offset: 1px;
  }

  /* ---------- dropzone ---------- */
  .dropzone{
    border: 1.5px dashed var(--sprocket); border-radius:2px; background: var(--paper);
    padding: 28px 20px; text-align:center; cursor:pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .dropzone:hover{ border-color:var(--rust); }
  .dropzone.dragover{ border-color:var(--rust); background: rgba(181,96,46,0.06); }
  .dropzone input[type=file]{ display:none; }
  .dropzone-icon{ width:34px; height:34px; margin:0 auto 10px; color:var(--sprocket); display:block; }
  .dropzone:hover .dropzone-icon, .dropzone.dragover .dropzone-icon{ color:var(--rust); }
  .dropzone-title{ font-family:var(--font-body); font-weight:600; font-size:14.5px; margin-bottom:3px; }
  .dropzone-title .link{ color:var(--rust); text-decoration:underline; text-underline-offset:2px; }
  .dropzone-hint{ font-family:var(--font-mono); font-size:11px; color:rgba(33,31,29,0.5); }

  /* ---------- selected file chips (pre-upload) ---------- */
  .file-chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .chip{
    display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--line);
    border-radius:1px; padding:5px 6px 5px 5px; max-width:220px;
  }
  .chip-thumb{ width:28px; height:28px; object-fit:cover; background:var(--ink); flex-shrink:0; border-radius:1px; }
  .chip-thumb.video-thumb{ display:flex; align-items:center; justify-content:center; color:var(--paper); font-family:var(--font-mono); font-size:14px; }
  .chip-name{ font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; }
  .chip-remove{ background:none; border:none; cursor:pointer; color:rgba(33,31,29,0.45); font-size:15px; line-height:1; padding:2px 4px; flex-shrink:0; }
  .chip-remove:hover{ color:#A13A2A; }

  .upload-footer{ display:flex; justify-content:flex-end; margin-top:18px; }

  /* ---------- folder picker ---------- */
  .folder-picker{ position:relative; }
  .folder-picker-btn{
    width:100%; display:flex; align-items:center; gap:8px; font-family:var(--font-body); font-size:14px;
    padding:11px 12px; background:var(--paper); border:1px solid var(--line); border-radius:1px;
    color:var(--ink); cursor:pointer; text-align:left;
  }
  .folder-picker-btn:hover{ border-color:var(--rust); }
  .folder-icon{ width:16px; height:16px; color:var(--rust); flex-shrink:0; }
  #folder-picker-label{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chevron-icon{ width:14px; height:14px; color:var(--sprocket); flex-shrink:0; transition: transform 0.15s ease; }
  .folder-picker-btn[aria-expanded="true"] .chevron-icon{ transform: rotate(180deg); }

  .folder-dropdown{
    position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:20;
    background:var(--paper); border:1px solid var(--line); border-radius:1px;
    box-shadow: 0 8px 20px rgba(33,31,29,0.14); max-height:240px; overflow-y:auto;
  }
  .folder-dropdown.hidden{ display:none; }
  .folder-dropdown-list{ padding:4px; }
  .folder-option{
    width:100%; display:flex; align-items:center; gap:8px; padding:9px 10px; background:none; border:none;
    cursor:pointer; font-family:var(--font-body); font-size:13.5px; color:var(--ink); text-align:left; border-radius:1px;
  }
  .folder-option:hover{ background:var(--paper-dim); }
  .folder-option.active{ background:var(--ink); color:var(--paper); }
  .folder-option svg{ width:14px; height:14px; color:var(--rust); flex-shrink:0; }
  .folder-option.active svg{ color:var(--paper); }

  .folder-new-row{ border-top:1px solid var(--line); padding:6px; }
  .folder-add-btn{
    width:100%; display:flex; align-items:center; gap:6px; padding:8px 10px; background:none; border:none;
    cursor:pointer; font-family:var(--font-mono); font-size:11.5px; letter-spacing:0.04em; text-transform:uppercase;
    color:var(--teal); border-radius:1px;
  }
  .folder-add-btn:hover{ background:var(--paper-dim); }
  .folder-new-input{ display:flex; gap:6px; padding:4px 4px 2px; }
  .folder-new-input.hidden{ display:none; }
  .folder-new-input input[type=text]{ flex:1; font-size:13px; padding:8px 9px; }

  button.primary{
    font-family:var(--font-mono); font-size:13px; letter-spacing:0.06em; text-transform:uppercase;
    background:var(--rust); color:var(--paper); border:none; padding:13px 26px; cursor:pointer;
    border-radius:1px; white-space:nowrap; transition: transform 0.12s ease, background 0.15s ease;
  }
  button.primary:hover{ background:#9C4F26; }
  button.primary:active{ transform: scale(0.98); }
  button.primary:disabled{ background:var(--sprocket); cursor:not-allowed; }

  #status{ font-family:var(--font-mono); font-size:12.5px; margin-top:12px; min-height:16px; color:var(--teal); }
  #status.error{ color:#A13A2A; }

  /* ---------- section head + toolbar ---------- */
  .section-head{
    display:flex; justify-content:space-between; align-items:baseline;
    border-bottom:1px solid var(--line); padding-bottom:10px; margin-bottom:18px;
  }
  .section-head h2{ font-family:var(--font-display); font-size:22px; font-weight:600; margin:0; }
  .section-head span{ font-family:var(--font-mono); font-size:12px; color:rgba(33,31,29,0.5); }

  .sheet-toolbar{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:22px; }
  .folder-pills{ display:flex; flex-wrap:wrap; gap:8px; }
  .pill{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.05em; text-transform:uppercase;
    padding:6px 13px; border:1px solid var(--line); border-radius:999px; background:var(--paper);
    cursor:pointer; color:rgba(33,31,29,0.65);
  }
  .pill:hover{ border-color:var(--rust); color:var(--rust); }
  .pill.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .toolbar-actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .ghost-btn{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.05em; text-transform:uppercase;
    padding:8px 13px; border:1px solid var(--line); background:transparent; cursor:pointer;
    border-radius:1px; color:var(--ink);
  }
  .ghost-btn:hover{ border-color:var(--rust); color:var(--rust); }
  .ghost-btn.danger:hover{ border-color:#A13A2A; color:#A13A2A; }
  .ghost-btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .batch-actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .batch-actions.hidden{ display:none; }
  #selected-count{ font-family:var(--font-mono); font-size:11px; color:rgba(33,31,29,0.55); }

  /* ---------- contact sheet grid ---------- */
  .sheet{ display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:20px; }
  .frame{
    background:var(--ink); padding:10px 10px 0; border-radius:1px; position:relative;
    box-shadow: 0 0 0 0 transparent; transition: box-shadow 0.15s ease;
  }
  .frame.frame-selected{ box-shadow: 0 0 0 3px var(--teal); }
  .frame-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .frame-number{ font-family:var(--font-mono); color:var(--paper); font-size:10.5px; letter-spacing:0.05em; opacity:0.75; }
  .frame-select{ display:none; align-items:center; }
  .sheet.select-mode .frame-select{ display:inline-flex; }
  .frame-select input{ width:16px; height:16px; accent-color:var(--teal); cursor:pointer; }

  .frame-media{ width:100%; aspect-ratio: 1 / 1; object-fit:cover; background:#000; display:block; }
  .frame-media-wrap{ position:relative; overflow:hidden; }
  .frame-meta{ padding:10px 2px 12px; display:flex; justify-content:space-between; align-items:flex-end; gap:8px; }
  .frame-meta .who{ color:var(--paper); font-size:13px; font-weight:500; line-height:1.3; }
  .frame-meta .who small{ display:block; font-family:var(--font-mono); font-size:10.5px; color:rgba(246,241,231,0.55); margin-top:2px; font-weight:400; }
  .frame-caption{ color:rgba(246,241,231,0.85); font-size:12.5px; padding:0 2px 10px; line-height:1.4; }

  .frame-actions{ display:flex; align-items:center; gap:2px; flex-shrink:0; }
  .icon-btn{
    background:none; border:none; cursor:pointer; color:rgba(246,241,231,0.6);
    font-size:13.5px; padding:5px 6px; line-height:1;
  }
  .icon-btn:hover{ color:var(--paper); }
  .icon-btn.danger:hover{ color:#E08669; }

  a.download{
    font-family:var(--font-mono); font-size:11px; color:var(--paper); background:rgba(246,241,231,0.14);
    border:1px solid rgba(246,241,231,0.3); padding:6px 9px; border-radius:1px; text-decoration:none; white-space:nowrap;
  }
  a.download:hover{ background:rgba(246,241,231,0.24); }

  /* ---------- inline edit form ---------- */
  .edit-form{ padding: 2px 2px 12px; }
  .edit-form input[type=text]{
    width:100%; font-size:12.5px; padding:7px 8px; margin-bottom:6px;
    background:rgba(246,241,231,0.08); border:1px solid rgba(246,241,231,0.25); color:var(--paper); border-radius:1px;
  }
  .edit-form input[type=text]::placeholder{ color:rgba(246,241,231,0.4); }
  .edit-actions{ display:flex; gap:6px; margin-top:4px; }
  .edit-actions .ghost-btn{ color:var(--paper); border-color:rgba(246,241,231,0.3); padding:6px 10px; }
  .edit-actions .ghost-btn:hover{ border-color:var(--paper); color:var(--paper); background:rgba(246,241,231,0.1); }

  .empty{
    font-family:var(--font-mono); font-size:13px; color:rgba(33,31,29,0.55);
    border:1px dashed var(--line); padding:40px 20px; text-align:center; border-radius:2px;
  }

  footer{ text-align:center; font-family:var(--font-mono); font-size:11px; color:rgba(33,31,29,0.4); padding:30px 24px 50px; }

  @media (prefers-reduced-motion: reduce){ button.primary{ transition:none; } }
</style>
</head>
<body>

<div class="filmstrip-edge"></div>

<header>
  <div class="eyebrow">Archive dagitay muryut &mdash; No login required</div>
  <h1>Fam Reels</h1>
  <p class="sub">Add, view, delete ken download kay pics <span id="frame-counter"></span></p>
</header>

<main>
  <div class="upload-card">
    <form id="upload-form">
      <div class="upload-steps">
        <div>
          <label for="uploader-name">1. Your name</label>
          <input type="text" id="uploader-name" placeholder="e.g. Ankol Burling" required />
        </div>
        <div>
          <label for="caption-input">2. Caption (optional)</label>
          <input type="text" id="caption-input" placeholder="e.g. Aw-Asen" />
        </div>
        <div>
          <label>3. Folder</label>
          <div class="folder-picker" id="folder-picker">
            <button type="button" class="folder-picker-btn" id="folder-picker-btn" aria-haspopup="listbox" aria-expanded="false">
              <svg class="folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h9a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6z"/></svg>
              <span id="folder-picker-label">Unsorted</span>
              <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="folder-dropdown hidden" id="folder-dropdown" role="listbox">
              <div class="folder-dropdown-list" id="folder-dropdown-list"></div>
              <div class="folder-new-row">
                <button type="button" class="folder-add-btn" id="folder-add-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
                  New folder
                </button>
                <div class="folder-new-input hidden" id="folder-new-input-wrap">
                  <input type="text" id="folder-new-input" placeholder="Folder name" />
                  <button type="button" class="ghost-btn" id="folder-new-confirm">Add</button>
                </div>
              </div>
            </div>
          </div>
          <input type="hidden" id="folder-input" value="Unsorted" />
          <datalist id="folder-list"></datalist>
        </div>
      </div>

      <label>4. Add photos or videos</label>
      <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Choose or drop photos and videos">
        <svg class="dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <rect x="3" y="5" width="18" height="15" rx="1.5"/>
          <path d="M3 16l4.5-4.5a1.5 1.5 0 0 1 2.1 0L14 16"/>
          <path d="M13.5 14.5l1.6-1.6a1.5 1.5 0 0 1 2.1 0L21 16.5"/>
          <circle cx="8" cy="9.5" r="1.4"/>
          <path d="M8 2.5h8M12 2.5v5" stroke-linecap="round"/>
        </svg>
        <div class="dropzone-title">Drop them here, or <span class="link">browse</span></div>
        <div class="dropzone-hint">JPG, PNG, HEIC, MP4, MOV &mdash; add as many as you like</div>
        <input type="file" id="file-input" accept="image/*,video/*" multiple />
      </div>

      <div class="file-chips" id="file-chips"></div>

      <div class="upload-footer">
        <button type="submit" class="primary" id="submit-btn">Add to reel</button>
      </div>
      <div id="status"></div>
    </form>
  </div>

  <div class="section-head">
    <h2>Contact sheet</h2>
    <span id="sheet-meta">loading&hellip;</span>
  </div>

  <div class="sheet-toolbar">
    <div class="folder-pills" id="folder-pills"></div>
    <div class="toolbar-actions">
      <button type="button" class="ghost-btn" id="select-toggle">Select frames</button>
      <div class="batch-actions hidden" id="batch-actions">
        <span id="selected-count">0 selected</span>
        <button type="button" class="ghost-btn" id="download-selected">Download ZIP</button>
        <button type="button" class="ghost-btn danger" id="delete-selected">Delete</button>
        <button type="button" class="ghost-btn" id="cancel-select">Cancel</button>
      </div>
    </div>
  </div>

  <div class="sheet" id="sheet"></div>
</main>

<footer>Developed in the family darkroom &middot; stored via Cloudinary &middot; indexed via Supabase</footer>

<div class="filmstrip-edge"></div>

<script>
  // ---- CONFIG ----
  const CLOUDINARY_CLOUD_NAME = "hjagtmmt";
  const CLOUDINARY_UPLOAD_PRESET = "family photos";
  const SUPABASE_URL = "https://yopxgvauhxfjwxxufcys.supabase.co";
  const SUPABASE_KEY = "sb_publishable_xmjlYA4lkXCNVWOopLHZ7g_qAltH_fo";

  const sheetEl = document.getElementById('sheet');
  const sheetMeta = document.getElementById('sheet-meta');
  const frameCounter = document.getElementById('frame-counter');
  const statusEl = document.getElementById('status');
  const form = document.getElementById('upload-form');
  const submitBtn = document.getElementById('submit-btn');
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  const chipsEl = document.getElementById('file-chips');
  const folderPickerBtn = document.getElementById('folder-picker-btn');
  const folderPickerLabel = document.getElementById('folder-picker-label');
  const folderDropdown = document.getElementById('folder-dropdown');
  const folderDropdownList = document.getElementById('folder-dropdown-list');
  const folderInput = document.getElementById('folder-input');
  const folderAddBtn = document.getElementById('folder-add-btn');
  const folderNewInputWrap = document.getElementById('folder-new-input-wrap');
  const folderNewInput = document.getElementById('folder-new-input');
  const folderNewConfirm = document.getElementById('folder-new-confirm');
  const folderPillsEl = document.getElementById('folder-pills');
  const selectToggleBtn = document.getElementById('select-toggle');
  const batchActionsEl = document.getElementById('batch-actions');
  const selectedCountEl = document.getElementById('selected-count');
  const downloadSelectedBtn = document.getElementById('download-selected');
  const deleteSelectedBtn = document.getElementById('delete-selected');
  const cancelSelectBtn = document.getElementById('cancel-select');

  let selectedFiles = [];   // files staged for upload
  let allRows = [];         // all rows fetched from Supabase
  let knownFolders = ['Unsorted']; // folders available to pick from
  let uploadFolder = 'Unsorted';
  let activeFolder = 'All';
  let selectMode = false;
  let selectedIds = new Set();

  function setStatus(msg, isError){
    statusEl.textContent = msg;
    statusEl.classList.toggle('error', !!isError);
  }

  function downloadUrl(url){
    const marker = '/upload/';
    const idx = url.indexOf(marker);
    if(idx === -1) return url;
    return url.slice(0, idx + marker.length) + 'fl_attachment/' + url.slice(idx + marker.length);
  }

  function filenameFromUrl(url){
    try{
      const clean = url.split('?')[0];
      return decodeURIComponent(clean.substring(clean.lastIndexOf('/') + 1));
    }catch(e){ return 'file'; }
  }

  function formatDate(iso){
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
  }

  // ============ FETCH (Read) ============
  async function fetchMedia(){
    sheetMeta.textContent = "loading…";
    try{
      const [mediaRes, foldersRes] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/media?select=*&order=created_at.desc`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        }),
        fetch(`${SUPABASE_URL}/rest/v1/folders?select=name&order=name.asc`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        })
      ]);
      if(!mediaRes.ok) throw new Error('Could not reach the gallery index');
      allRows = await mediaRes.json();
      const folderRows = foldersRes.ok ? await foldersRes.json() : [];
      const fromFolders = folderRows.map(f => f.name);
      const fromMedia = allRows.map(r => r.folder || 'Unsorted');
      knownFolders = [...new Set(['Unsorted', ...fromFolders, ...fromMedia])].sort((a,b) =>
        a === 'Unsorted' ? -1 : b === 'Unsorted' ? 1 : a.localeCompare(b)
      );
      document.getElementById('folder-list').innerHTML = knownFolders.map(f => `<option value="${f}"></option>`).join('');
      renderFolderPills();
      renderFolderDropdown();
      renderSheet();
    }catch(err){
      sheetMeta.textContent = "";
      sheetEl.innerHTML = `<div class="empty">Couldn't load the gallery. ${err.message}</div>`;
    }
  }

  async function createFolder(name){
    if(!name || knownFolders.includes(name)) return;
    knownFolders.push(name);
    knownFolders.sort((a,b) => a === 'Unsorted' ? -1 : b === 'Unsorted' ? 1 : a.localeCompare(b));
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/folders`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json', Prefer: 'return=minimal'
        },
        body: JSON.stringify({ name })
      });
    }catch(err){ /* non-fatal: folder still usable this session */ }
  }

  // ---- folder dropdown (upload form) ----
  function setUploadFolder(name){
    uploadFolder = name;
    folderInput.value = name;
    folderPickerLabel.textContent = name;
    renderFolderDropdown();
  }

  function renderFolderDropdown(){
    folderDropdownList.innerHTML = knownFolders.map(f => `
      <button type="button" class="folder-option ${f === uploadFolder ? 'active' : ''}" data-folder="${f}" role="option">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h9a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6z"/></svg>
        ${f}
      </button>
    `).join('');
    folderDropdownList.querySelectorAll('.folder-option').forEach(btn => {
      btn.addEventListener('click', () => {
        setUploadFolder(btn.dataset.folder);
        closeFolderDropdown();
      });
    });
  }

  function openFolderDropdown(){
    folderDropdown.classList.remove('hidden');
    folderPickerBtn.setAttribute('aria-expanded', 'true');
  }
  function closeFolderDropdown(){
    folderDropdown.classList.add('hidden');
    folderPickerBtn.setAttribute('aria-expanded', 'false');
    folderNewInputWrap.classList.add('hidden');
    folderNewInput.value = '';
  }

  folderPickerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    folderDropdown.classList.contains('hidden') ? openFolderDropdown() : closeFolderDropdown();
  });
  document.addEventListener('click', (e) => {
    if(!document.getElementById('folder-picker').contains(e.target)) closeFolderDropdown();
  });
  folderAddBtn.addEventListener('click', () => {
    folderNewInputWrap.classList.remove('hidden');
    folderNewInput.focus();
  });
  folderNewConfirm.addEventListener('click', confirmNewFolder);
  folderNewInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); confirmNewFolder(); }
  });
  async function confirmNewFolder(){
    const name = folderNewInput.value.trim();
    if(!name) return;
    await createFolder(name);
    renderFolderDropdown();
    setUploadFolder(name);
    closeFolderDropdown();
  }

  function renderFolderPills(){
    const folders = [...new Set(allRows.map(r => r.folder || 'Unsorted'))].sort();
    const all = ['All', ...folders];
    folderPillsEl.innerHTML = all.map(f =>
      `<button type="button" class="pill ${f === activeFolder ? 'active' : ''}" data-folder="${f}">${f} ${f !== 'All' ? `(${allRows.filter(r => (r.folder||'Unsorted')===f).length})` : ''}</button>`
    ).join('');
    folderPillsEl.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFolder = btn.dataset.folder;
        renderFolderPills();
        renderSheet();
      });
    });
  }

  function currentRows(){
    return activeFolder === 'All' ? allRows : allRows.filter(r => (r.folder || 'Unsorted') === activeFolder);
  }

  // ============ RENDER ============
  function renderSheet(){
    const rows = currentRows();
    frameCounter.textContent = allRows.length ? `— ${allRows.length} frame${allRows.length===1?'':'s'} developed so far.` : '';
    sheetMeta.textContent = rows.length ? `${rows.length} frame${rows.length===1?'':'s'}` : 'no frames yet';
    sheetEl.classList.toggle('select-mode', selectMode);

    if(!rows.length){
      sheetEl.innerHTML = `<div class="empty">No photos or videos here yet.</div>`;
      return;
    }

    sheetEl.innerHTML = rows.map((row, i) => {
      const num = String(rows.length - i).padStart(3, '0');
      const isSelected = selectedIds.has(row.id);
      const media = row.resource_type === 'video'
        ? `<video class="frame-media" src="${row.file_url}" controls preload="metadata"></video>`
        : `<img class="frame-media" src="${row.file_url}" loading="lazy" alt="${(row.caption||'Family photo').replace(/"/g,'&quot;')}" />`;

      return `
        <div class="frame ${isSelected ? 'frame-selected' : ''}" data-id="${row.id}">
          <div class="frame-top">
            <span class="frame-number">FRAME ${num}</span>
            <label class="frame-select">
              <input type="checkbox" class="select-box" data-id="${row.id}" ${isSelected ? 'checked' : ''} />
            </label>
          </div>
          <div class="frame-media-wrap">${media}</div>
          <div class="frame-body" data-id="${row.id}">
            ${row.caption ? `<div class="frame-caption">${row.caption}</div>` : ''}
            <div class="frame-meta">
              <div class="who">${row.uploader_name}<small>${formatDate(row.created_at)} &middot; ${row.folder || 'Unsorted'}</small></div>
              <div class="frame-actions">
                <button type="button" class="icon-btn edit-btn" data-id="${row.id}" title="Edit" aria-label="Edit">&#9998;</button>
                <button type="button" class="icon-btn danger delete-btn" data-id="${row.id}" title="Delete" aria-label="Delete">&#128465;</button>
                <a class="download" href="${downloadUrl(row.file_url)}" download>Download</a>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    wireFrameEvents();
  }

  function wireFrameEvents(){
    sheetEl.querySelectorAll('.select-box').forEach(box => {
      box.addEventListener('change', () => {
        const id = box.dataset.id;
        if(box.checked) selectedIds.add(id); else selectedIds.delete(id);
        box.closest('.frame').classList.toggle('frame-selected', box.checked);
        updateBatchUI();
      });
    });
    sheetEl.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => openEditForm(btn.dataset.id));
    });
    sheetEl.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteFrame(btn.dataset.id));
    });
  }

  // ============ UPDATE ============
  function openEditForm(id){
    const row = allRows.find(r => String(r.id) === String(id));
    if(!row) return;
    const body = sheetEl.querySelector(`.frame-body[data-id="${id}"]`);
    if(!body) return;
    body.innerHTML = `
      <div class="edit-form">
        <input type="text" class="edit-name" value="${row.uploader_name.replace(/"/g,'&quot;')}" placeholder="Name" />
        <input type="text" class="edit-caption" value="${(row.caption||'').replace(/"/g,'&quot;')}" placeholder="Caption" />
        <input type="text" class="edit-folder" value="${(row.folder||'').replace(/"/g,'&quot;')}" placeholder="Folder" list="folder-list" />
        <div class="edit-actions">
          <button type="button" class="ghost-btn save-edit-btn">Save</button>
          <button type="button" class="ghost-btn cancel-edit-btn">Cancel</button>
        </div>
      </div>
    `;
    body.querySelector('.cancel-edit-btn').addEventListener('click', () => renderSheet());
    body.querySelector('.save-edit-btn').addEventListener('click', () => saveEdit(id, body));
  }

  async function saveEdit(id, body){
    const name = body.querySelector('.edit-name').value.trim();
    const caption = body.querySelector('.edit-caption').value.trim();
    const folder = body.querySelector('.edit-folder').value.trim();
    if(!name){ alert('Name cannot be empty.'); return; }

    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/media?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json', Prefer: 'return=minimal'
        },
        body: JSON.stringify({ uploader_name: name, caption: caption || null, folder: folder || 'Unsorted' })
      });
      if(!res.ok) throw new Error(await res.text());
      setStatus('Frame updated.');
      await fetchMedia();
    }catch(err){
      setStatus('Could not save changes: ' + err.message, true);
    }
  }

  // ============ DELETE ============
  async function deleteFrame(id){
    if(!confirm('Remove this frame from the shared gallery? (It stays in Cloudinary storage — ask whoever manages the account to remove it there too if you want the space back.)')) return;
    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/media?id=eq.${id}`, {
        method: 'DELETE',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      if(!res.ok) throw new Error(await res.text());
      selectedIds.delete(id);
      await fetchMedia();
    }catch(err){
      setStatus('Could not delete: ' + err.message, true);
    }
  }

  async function deleteSelected(){
    if(!selectedIds.size) return;
    if(!confirm(`Remove ${selectedIds.size} selected frame(s) from the shared gallery? (Files stay in Cloudinary storage.)`)) return;
    const ids = [...selectedIds];
    try{
      for(const id of ids){
        await fetch(`${SUPABASE_URL}/rest/v1/media?id=eq.${id}`, {
          method: 'DELETE',
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        });
      }
      selectedIds.clear();
      exitSelectMode();
      await fetchMedia();
    }catch(err){
      setStatus('Some deletes may have failed: ' + err.message, true);
    }
  }

  // ============ BATCH SELECT + ZIP DOWNLOAD ============
  function updateBatchUI(){
    selectedCountEl.textContent = `${selectedIds.size} selected`;
    downloadSelectedBtn.disabled = selectedIds.size === 0;
    deleteSelectedBtn.disabled = selectedIds.size === 0;
  }

  function enterSelectMode(){
    selectMode = true;
    selectToggleBtn.classList.add('hidden');
    batchActionsEl.classList.remove('hidden');
    sheetEl.classList.add('select-mode');
    updateBatchUI();
  }
  function exitSelectMode(){
    selectMode = false;
    selectedIds.clear();
    selectToggleBtn.classList.remove('hidden');
    batchActionsEl.classList.add('hidden');
    renderSheet();
  }

  selectToggleBtn.addEventListener('click', enterSelectMode);
  cancelSelectBtn.addEventListener('click', exitSelectMode);
  deleteSelectedBtn.addEventListener('click', deleteSelected);

  downloadSelectedBtn.addEventListener('click', async () => {
    if(!selectedIds.size) return;
    const items = allRows.filter(r => selectedIds.has(r.id));
    downloadSelectedBtn.disabled = true;
    const zip = new JSZip();
    let done = 0;
    try{
      for(const item of items){
        setStatus(`Zipping ${done+1} of ${items.length}: ${filenameFromUrl(item.file_url)}…`);
        const resp = await fetch(item.file_url);
        if(!resp.ok) throw new Error(`Could not fetch ${filenameFromUrl(item.file_url)}`);
        const blob = await resp.blob();
        let name = filenameFromUrl(item.file_url);
        if(zip.files[name]) name = `${done+1}-${name}`;
        zip.file(name, blob);
        done++;
      }
      setStatus('Packing the zip file…');
      const content = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(content);
      a.download = `family-reel-${Date.now()}.zip`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setStatus(`Downloaded ${done} file${done===1?'':'s'} as a zip.`);
    }catch(err){
      setStatus('Batch download failed: ' + err.message, true);
    }finally{
      downloadSelectedBtn.disabled = false;
    }
  });

  // ============ CREATE (upload) ============
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); fileInput.click(); }
  });
  ['dragenter','dragover'].forEach(evt =>
    dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('dragover'); })
  );
  ['dragleave','drop'].forEach(evt =>
    dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); })
  );
  dropzone.addEventListener('drop', (e) => { addFiles(e.dataTransfer.files); });
  fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

  function addFiles(fileList){
    for(const file of fileList) selectedFiles.push(file);
    renderChips();
  }
  function removeFile(index){
    const removed = selectedFiles[index];
    if(removed && removed._previewUrl) URL.revokeObjectURL(removed._previewUrl);
    selectedFiles.splice(index, 1);
    renderChips();
  }
  function renderChips(){
    chipsEl.innerHTML = selectedFiles.map((file, i) => {
      const isVideo = file.type.startsWith('video/');
      let thumb;
      if(isVideo){
        thumb = `<div class="chip-thumb video-thumb">&#9654;</div>`;
      }else{
        if(!file._previewUrl) file._previewUrl = URL.createObjectURL(file);
        thumb = `<img class="chip-thumb" src="${file._previewUrl}" alt="" />`;
      }
      return `
        <div class="chip">
          ${thumb}
          <span class="chip-name">${file.name}</span>
          <button type="button" class="chip-remove" data-index="${i}" aria-label="Remove ${file.name}">&times;</button>
        </div>
      `;
    }).join('');
    chipsEl.querySelectorAll('.chip-remove').forEach(btn => {
      btn.addEventListener('click', () => removeFile(Number(btn.dataset.index)));
    });
  }

  async function uploadOne(file, uploaderName, caption, folder){
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, { method: 'POST', body: fd });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error?.message || 'Upload failed');

    const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/media`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json', Prefer: 'return=minimal'
      },
      body: JSON.stringify({
        uploader_name: uploaderName,
        file_url: data.secure_url,
        resource_type: data.resource_type === 'video' ? 'video' : 'image',
        caption: caption || null,
        folder: folder || 'Unsorted'
      })
    });
    if(!insertRes.ok){
      const t = await insertRes.text();
      throw new Error('Saved to storage but failed to index it: ' + t);
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const uploaderName = document.getElementById('uploader-name').value.trim();
    const caption = document.getElementById('caption-input').value.trim();
    const folder = document.getElementById('folder-input').value.trim();
    const files = selectedFiles;

    if(!uploaderName || !files.length){
      setStatus('Add your name and at least one photo or video.', true);
      return;
    }

    submitBtn.disabled = true;
    let done = 0;
    try{
      for(const file of files){
        setStatus(`Developing ${done+1} of ${files.length}: ${file.name}…`);
        await uploadOne(file, uploaderName, caption, folder);
        done++;
      }
      setStatus(`Added ${done} file${done===1?'':'s'} to the reel.`);
      selectedFiles.forEach(f => f._previewUrl && URL.revokeObjectURL(f._previewUrl));
      selectedFiles = [];
      renderChips();
      form.reset();
      setUploadFolder('Unsorted');
      fetchMedia();
    }catch(err){
      setStatus(`Stopped after ${done} of ${files.length}: ${err.message}`, true);
    }finally{
      submitBtn.disabled = false;
    }
  });

  fetchMedia();
</script>

</body>
</html>
